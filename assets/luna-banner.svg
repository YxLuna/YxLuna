<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 420" width="1000" height="420" role="img" aria-label="Luna's Cosmic Space — a golden sailboat drifting on a sea of stars beneath a crescent moon">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#101a38"/>
      <stop offset="0.55" stop-color="#0b1128"/>
      <stop offset="1" stop-color="#0a0f24"/>
    </linearGradient>
    <linearGradient id="seaGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#16244a"/>
      <stop offset="0.35" stop-color="#101a38"/>
      <stop offset="1" stop-color="#0a0f24"/>
    </linearGradient>
    <linearGradient id="horizonGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7aa2f7" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#7aa2f7" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#7aa2f7" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="moonGrad" cx="0.4" cy="0.35" r="1">
      <stop offset="0" stop-color="#f7e3b0"/>
      <stop offset="0.55" stop-color="#e6b75c"/>
      <stop offset="1" stop-color="#c9932f"/>
    </radialGradient>
    <linearGradient id="goldGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f4dfa6"/>
      <stop offset="0.5" stop-color="#e6b75c"/>
      <stop offset="1" stop-color="#d9a844"/>
    </linearGradient>
    <linearGradient id="sailGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f7e3b0"/>
      <stop offset="1" stop-color="#e6b75c"/>
    </linearGradient>
    <linearGradient id="tailGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#f5f3ed" stop-opacity="0"/>
      <stop offset="1" stop-color="#f5f3ed" stop-opacity="0.95"/>
    </linearGradient>
    <filter id="glowGold" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="10" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowSoft" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="blurBig"><feGaussianBlur stdDeviation="34"/></filter>
    <mask id="moonMask">
      <circle cx="760" cy="230" r="90" fill="#fff"/>
      <circle cx="726" cy="196" r="80" fill="#000"/>
    </mask>
    <clipPath id="frame"><rect x="0" y="0" width="1000" height="420" rx="16"/></clipPath>
    <path id="sparkle" d="M0 -7 L1.8 -1.8 L7 0 L1.8 1.8 L0 7 L-1.8 1.8 L-7 0 L-1.8 -1.8 Z"/>
  </defs>

  <!-- deep space background -->
  <rect x="0" y="0" width="1000" height="420" rx="16" fill="url(#bgGrad)"/>

  <g clip-path="url(#frame)">

  <!-- drifting nebulae -->
  <g opacity="0.95">
    <ellipse cx="240" cy="300" rx="240" ry="66" fill="#7aa2f7" opacity="0.10" filter="url(#blurBig)">
      <animateTransform attributeName="transform" type="translate" values="0 0; 34 -10; 0 0" dur="26s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="640" cy="320" rx="300" ry="60" fill="#4a6ecf" opacity="0.10" filter="url(#blurBig)">
      <animateTransform attributeName="transform" type="translate" values="0 0; -40 8; 0 0" dur="32s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="520" cy="70" rx="220" ry="46" fill="#7aa2f7" opacity="0.06" filter="url(#blurBig)">
      <animateTransform attributeName="transform" type="translate" values="0 0; 26 6; 0 0" dur="22s" repeatCount="indefinite"/>
    </ellipse>
  </g>

  <!-- star field -->
  <g fill="#f5f3ed">
    <circle cx="60"  cy="60"  r="1.6"><animate attributeName="opacity" values="0.2;1;0.2" dur="3.1s" begin="-0.4s" repeatCount="indefinite"/></circle>
    <circle cx="150" cy="140" r="1.1"><animate attributeName="opacity" values="0.15;0.9;0.15" dur="2.6s" begin="-1.2s" repeatCount="indefinite"/></circle>
    <circle cx="230" cy="50"  r="1.4"><animate attributeName="opacity" values="0.25;1;0.25" dur="3.8s" begin="-2s" repeatCount="indefinite"/></circle>
    <circle cx="330" cy="100" r="1.2"><animate attributeName="opacity" values="0.2;0.9;0.2" dur="2.9s" begin="-0.9s" repeatCount="indefinite"/></circle>
    <circle cx="420" cy="40"  r="1.7"><animate attributeName="opacity" values="0.3;1;0.3" dur="3.4s" begin="-1.6s" repeatCount="indefinite"/></circle>
    <circle cx="500" cy="130" r="1.0"><animate attributeName="opacity" values="0.15;0.85;0.15" dur="2.4s" begin="-0.2s" repeatCount="indefinite"/></circle>
    <circle cx="585" cy="60"  r="1.3"><animate attributeName="opacity" values="0.2;1;0.2" dur="3.6s" begin="-2.4s" repeatCount="indefinite"/></circle>
    <circle cx="660" cy="110" r="1.1"><animate attributeName="opacity" values="0.2;0.9;0.2" dur="2.7s" begin="-1s" repeatCount="indefinite"/></circle>
    <circle cx="870" cy="70"  r="1.5"><animate attributeName="opacity" values="0.25;1;0.25" dur="3.2s" begin="-0.7s" repeatCount="indefinite"/></circle>
    <circle cx="940" cy="150" r="1.2"><animate attributeName="opacity" values="0.2;0.9;0.2" dur="2.8s" begin="-1.8s" repeatCount="indefinite"/></circle>
    <circle cx="920" cy="300" r="1.4"><animate attributeName="opacity" values="0.2;1;0.2" dur="3.5s" begin="-0.5s" repeatCount="indefinite"/></circle>
    <circle cx="90"  cy="250" r="1.2"><animate attributeName="opacity" values="0.2;0.9;0.2" dur="3s"   begin="-2.2s" repeatCount="indefinite"/></circle>
    <circle cx="60"  cy="320" r="1.5"><animate attributeName="opacity" values="0.25;1;0.25" dur="3.3s" begin="-0.8s" repeatCount="indefinite"/></circle>
    <circle cx="300" cy="320" r="1.1"><animate attributeName="opacity" values="0.15;0.85;0.15" dur="2.6s" begin="-1.1s" repeatCount="indefinite"/></circle>
    <circle cx="480" cy="300" r="1.3"><animate attributeName="opacity" values="0.2;0.95;0.2" dur="3.7s" begin="-2.8s" repeatCount="indefinite"/></circle>
    <circle cx="770" cy="40"  r="1.2" fill="#7aa2f7"><animate attributeName="opacity" values="0.3;1;0.3" dur="2.9s" begin="-0.3s" repeatCount="indefinite"/></circle>
    <circle cx="380" cy="180" r="1.0" fill="#7aa2f7"><animate attributeName="opacity" values="0.2;0.8;0.2" dur="3.1s" begin="-1.9s" repeatCount="indefinite"/></circle>
    <circle cx="640" cy="290" r="1.2" fill="#7aa2f7"><animate attributeName="opacity" values="0.2;0.9;0.2" dur="2.7s" begin="-0.6s" repeatCount="indefinite"/></circle>
    <circle cx="200" cy="210" r="1.0" fill="#e6b75c"><animate attributeName="opacity" values="0.2;0.9;0.2" dur="3.4s" begin="-2.6s" repeatCount="indefinite"/></circle>
    <circle cx="560" cy="250" r="1.1" fill="#e6b75c"><animate attributeName="opacity" values="0.2;0.85;0.2" dur="2.8s" begin="-1.5s" repeatCount="indefinite"/></circle>
  </g>

  <!-- sparkles (four-point stars) -->
  <g fill="#e6b75c" filter="url(#glowSoft)">
    <g transform="translate(560,90)">
      <use href="#sparkle" opacity="0.9">
        <animateTransform attributeName="transform" type="scale" values="0.5;1.05;0.5" dur="3.2s" repeatCount="indefinite"/>
      </use>
    </g>
    <g transform="translate(890,210)" fill="#f5f3ed">
      <use href="#sparkle" opacity="0.8">
        <animateTransform attributeName="transform" type="scale" values="0.9;0.4;0.9" dur="4s" repeatCount="indefinite"/>
      </use>
    </g>
    <g transform="translate(130,110)" fill="#7aa2f7">
      <use href="#sparkle" opacity="0.8">
        <animateTransform attributeName="transform" type="scale" values="0.4;0.95;0.4" dur="3.6s" begin="-1.3s" repeatCount="indefinite"/>
      </use>
    </g>
  </g>

  <!-- tiny ringed planet -->
  <g transform="translate(110,290)" opacity="0.75">
    <circle r="9" fill="#7aa2f7"/>
    <ellipse rx="17" ry="5" fill="none" stroke="#e6b75c" stroke-width="1.4" transform="rotate(-18)" opacity="0.8"/>
    <animateTransform attributeName="transform" type="translate" values="110 290; 110 284; 110 290" dur="9s" repeatCount="indefinite" additive="replace"/>
  </g>

  <!-- shooting stars -->
  <g opacity="0">
    <path d="M0 0 L-78 0" stroke="url(#tailGrad)" stroke-width="2.4" stroke-linecap="round" transform="rotate(20)"/>
    <circle r="2.4" fill="#f5f3ed"/>
    <animateTransform attributeName="transform" type="translate" values="-80 30; 560 250; 560 250" keyTimes="0;0.16;1" dur="9s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;1;0;0" keyTimes="0;0.03;0.12;0.16;1" dur="9s" repeatCount="indefinite"/>
  </g>
  <g opacity="0">
    <path d="M0 0 L-64 0" stroke="url(#tailGrad)" stroke-width="2" stroke-linecap="round" transform="rotate(164)"/>
    <circle r="2" fill="#f5f3ed"/>
    <animateTransform attributeName="transform" type="translate" values="1060 90; 460 250; 460 250" keyTimes="0;0.14;1" dur="13s" begin="-5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;1;0;0" keyTimes="0;0.02;0.1;0.14;1" dur="13s" begin="-5s" repeatCount="indefinite"/>
  </g>

  <!-- ===== crescent moon, bobbing gently ===== -->
  <g>
    <animateTransform attributeName="transform" type="translate" values="0 0; 0 -7; 0 0" dur="6.5s" repeatCount="indefinite"/>

    <g filter="url(#glowGold)">
      <circle cx="760" cy="230" r="90" fill="url(#moonGrad)" mask="url(#moonMask)"/>
    </g>
    <g mask="url(#moonMask)" opacity="0.3" fill="#a87f2e">
      <ellipse cx="798" cy="280" rx="12" ry="9"/>
      <ellipse cx="830" cy="238" rx="8" ry="6"/>
      <ellipse cx="772" cy="312" rx="6" ry="5"/>
    </g>

    <!-- dashed orbit hint -->
    <ellipse cx="760" cy="230" rx="128" ry="34" fill="none" stroke="#7aa2f7" stroke-width="1" stroke-dasharray="3 7" opacity="0.28" transform="rotate(-14 760 230)">
      <animate attributeName="stroke-dashoffset" values="0;-100" dur="14s" repeatCount="indefinite"/>
    </ellipse>
  </g>

  <!-- ===== sea of stars ===== -->
  <g>
    <rect x="0" y="352" width="1000" height="68" fill="url(#seaGrad)"/>
    <rect x="0" y="351" width="1000" height="1.6" fill="url(#horizonGrad)" filter="url(#glowSoft)"/>

    <!-- gentle wave lines -->
    <g fill="none" stroke="#7aa2f7" stroke-width="1" opacity="0.14" stroke-linecap="round">
      <path d="M -60 366 Q 40 362 140 366 T 340 366 T 540 366 T 740 366 T 940 366 T 1140 366">
        <animateTransform attributeName="transform" type="translate" values="0 0; -46 0; 0 0" dur="17s" repeatCount="indefinite"/>
      </path>
      <path d="M -60 384 Q 50 380 160 384 T 380 384 T 600 384 T 820 384 T 1040 384">
        <animateTransform attributeName="transform" type="translate" values="0 0; 52 0; 0 0" dur="21s" repeatCount="indefinite"/>
      </path>
      <path d="M -60 402 Q 45 398 150 402 T 360 402 T 570 402 T 780 402 T 990 402 T 1200 402">
        <animateTransform attributeName="transform" type="translate" values="0 0; -38 0; 0 0" dur="25s" repeatCount="indefinite"/>
      </path>
    </g>

    <!-- moonlight reflection shimmer -->
    <g fill="#e6b75c">
      <rect x="716" y="357" width="88" height="2.4" rx="1.2" opacity="0.3">
        <animate attributeName="opacity" values="0.14;0.34;0.14" dur="4.2s" repeatCount="indefinite"/>
        <animateTransform attributeName="transform" type="translate" values="0 0; -8 0; 0 0" dur="6s" repeatCount="indefinite"/>
      </rect>
      <rect x="728" y="365" width="64" height="2.2" rx="1.1" opacity="0.24">
        <animate attributeName="opacity" values="0.1;0.28;0.1" dur="3.6s" begin="-1.2s" repeatCount="indefinite"/>
        <animateTransform attributeName="transform" type="translate" values="0 0; 9 0; 0 0" dur="7s" repeatCount="indefinite"/>
      </rect>
      <rect x="706" y="374" width="108" height="2.2" rx="1.1" opacity="0.2">
        <animate attributeName="opacity" values="0.08;0.24;0.08" dur="4.8s" begin="-2s" repeatCount="indefinite"/>
        <animateTransform attributeName="transform" type="translate" values="0 0; -12 0; 0 0" dur="8s" repeatCount="indefinite"/>
      </rect>
      <rect x="734" y="385" width="52" height="2" rx="1" opacity="0.16">
        <animate attributeName="opacity" values="0.06;0.2;0.06" dur="3.2s" begin="-0.8s" repeatCount="indefinite"/>
        <animateTransform attributeName="transform" type="translate" values="0 0; 10 0; 0 0" dur="6.5s" repeatCount="indefinite"/>
      </rect>
      <rect x="720" y="397" width="80" height="2" rx="1" opacity="0.12">
        <animate attributeName="opacity" values="0.05;0.16;0.05" dur="5s" begin="-1.6s" repeatCount="indefinite"/>
        <animateTransform attributeName="transform" type="translate" values="0 0; -10 0; 0 0" dur="9s" repeatCount="indefinite"/>
      </rect>
      <rect x="740" y="409" width="42" height="1.8" rx="0.9" opacity="0.1">
        <animate attributeName="opacity" values="0.04;0.13;0.04" dur="4s" begin="-2.4s" repeatCount="indefinite"/>
      </rect>
    </g>

    <!-- star glints on the water -->
    <g fill="#f5f3ed">
      <rect x="90"  y="368" width="14" height="1.6" rx="0.8" opacity="0.2"><animate attributeName="opacity" values="0.06;0.26;0.06" dur="3.4s" begin="-0.5s" repeatCount="indefinite"/></rect>
      <rect x="205" y="392" width="10" height="1.5" rx="0.75" opacity="0.15"><animate attributeName="opacity" values="0.05;0.2;0.05" dur="2.8s" begin="-1.7s" repeatCount="indefinite"/></rect>
      <rect x="415" y="378" width="16" height="1.6" rx="0.8" opacity="0.18" fill="#7aa2f7"><animate attributeName="opacity" values="0.06;0.24;0.06" dur="3.9s" begin="-2.3s" repeatCount="indefinite"/></rect>
      <rect x="545" y="398" width="12" height="1.5" rx="0.75" opacity="0.14"><animate attributeName="opacity" values="0.05;0.18;0.05" dur="3.1s" begin="-0.9s" repeatCount="indefinite"/></rect>
      <rect x="620" y="370" width="11" height="1.5" rx="0.75" opacity="0.16" fill="#7aa2f7"><animate attributeName="opacity" values="0.05;0.22;0.05" dur="2.6s" begin="-1.3s" repeatCount="indefinite"/></rect>
      <rect x="880" y="382" width="15" height="1.6" rx="0.8" opacity="0.18"><animate attributeName="opacity" values="0.06;0.24;0.06" dur="3.6s" begin="-2.1s" repeatCount="indefinite"/></rect>
      <rect x="950" y="404" width="10" height="1.5" rx="0.75" opacity="0.13" fill="#e6b75c"><animate attributeName="opacity" values="0.04;0.17;0.04" dur="4.2s" begin="-0.4s" repeatCount="indefinite"/></rect>
    </g>

    <!-- ===== the little golden sailboat ===== -->
    <g transform="translate(300,360)">
      <animateTransform attributeName="transform" type="translate" values="300 360; 392 358; 300 360" dur="46s" repeatCount="indefinite" additive="replace"/>
      <g>
        <animateTransform attributeName="transform" type="rotate" values="-3 0 4; 3 0 4; -3 0 4" dur="5.2s" repeatCount="indefinite"/>

        <!-- boat reflection -->
        <ellipse cx="0" cy="13" rx="34" ry="4" fill="#e6b75c" opacity="0.12" filter="url(#glowSoft)"/>

        <!-- hull -->
        <path d="M -33 -4 C -28 6 -14 9 0 9 C 15 9 28 5 34 -6 C 20 -2 -18 -1 -33 -4 Z"
              fill="#0a0f1e" stroke="#e6b75c" stroke-width="1.6" stroke-linejoin="round"/>

        <!-- mast -->
        <path d="M 3 -6 L 3 -58" stroke="#e6b75c" stroke-width="1.6" stroke-linecap="round"/>

        <!-- main sail (golden, billowing) -->
        <path d="M 6 -55 C 24 -44 30 -26 31 -9 L 6 -9 Z" fill="url(#sailGrad)" opacity="0.95" stroke="#d9a844" stroke-width="1"/>
        <!-- jib sail (moonlit blue) -->
        <path d="M 0 -48 C -14 -38 -20 -22 -22 -9 L 0 -9 Z" fill="#7aa2f7" opacity="0.8" stroke="#5b82d6" stroke-width="1"/>

        <!-- pennant -->
        <g>
          <path d="M 3 -58 L 16 -54 L 3 -50 Z" fill="#f5f3ed" opacity="0.9">
            <animateTransform attributeName="transform" type="rotate" values="-6 3 -58; 5 3 -58; -6 3 -58" dur="2.6s" repeatCount="indefinite"/>
          </path>
        </g>

        <!-- bow lantern -->
        <path d="M -30 -5 L -30 -12" stroke="#e6b75c" stroke-width="1" opacity="0.8"/>
        <circle cx="-30" cy="-15" r="2.6" fill="#f7e3b0" filter="url(#glowSoft)">
          <animate attributeName="opacity" values="0.6;1;0.6" dur="2.8s" repeatCount="indefinite"/>
        </circle>

        <!-- wake -->
        <path d="M -38 8 Q -48 9 -56 7" stroke="#7aa2f7" stroke-width="1" fill="none" opacity="0.3" stroke-linecap="round">
          <animate attributeName="opacity" values="0.12;0.34;0.12" dur="3.4s" repeatCount="indefinite"/>
        </path>
      </g>
    </g>
  </g>

  <!-- title -->
  <g text-anchor="middle" font-family="Georgia, 'Palatino Linotype', 'Times New Roman', serif">
    <text x="330" y="186" font-size="54" font-style="italic" fill="#e6b75c" opacity="0.35" filter="url(#glowSoft)">Luna's Cosmic Space
      <animate attributeName="opacity" values="0.25;0.55;0.25" dur="4.5s" repeatCount="indefinite"/>
    </text>
    <text x="330" y="186" font-size="54" font-style="italic" fill="url(#goldGrad)" letter-spacing="1">Luna's Cosmic Space</text>
    <text x="330" y="228" font-size="20" fill="#f4dfa6" opacity="0.85" letter-spacing="8">星海浩瀚 · 泛月而航</text>
    <text x="330" y="258" font-size="15" fill="#7aa2f7" opacity="0.9" letter-spacing="2" font-style="italic">✦ vast is the sea of stars — I sail by moonlight ✦</text>
  </g>

  </g>
</svg>
