<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 150" width="1000" height="150" role="img" aria-label="A little golden sailboat sails home across the sea of stars">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0b1128"/><stop offset="1" stop-color="#101a38"/>
    </linearGradient>
    <linearGradient id="sea" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#16244a"/><stop offset="0.4" stop-color="#101a38"/><stop offset="1" stop-color="#0a0f24"/>
    </linearGradient>
    <linearGradient id="hz" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7aa2f7" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#7aa2f7" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#7aa2f7" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="mg" cx="0.4" cy="0.35" r="1">
      <stop offset="0" stop-color="#f7e3b0"/><stop offset="0.55" stop-color="#e6b75c"/><stop offset="1" stop-color="#c9932f"/>
    </radialGradient>
    <linearGradient id="sg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f7e3b0"/><stop offset="1" stop-color="#e6b75c"/>
    </linearGradient>
    <filter id="gs" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <mask id="mm">
      <circle cx="912" cy="34" r="24" fill="#fff"/>
      <circle cx="903" cy="25" r="21" fill="#000"/>
    </mask>
    <clipPath id="fr"><rect x="0" y="0" width="1000" height="150" rx="16"/></clipPath>
  </defs>

  <rect x="0" y="0" width="1000" height="150" rx="16" fill="url(#sky)"/>

  <g clip-path="url(#fr)">
    <!-- night sky -->
    <g fill="#f5f3ed">
      <circle cx="70"  cy="26" r="1.3"><animate attributeName="opacity" values="0.2;1;0.2" dur="3.1s" repeatCount="indefinite"/></circle>
      <circle cx="180" cy="48" r="1.1"><animate attributeName="opacity" values="0.15;0.85;0.15" dur="2.6s" begin="-1.1s" repeatCount="indefinite"/></circle>
      <circle cx="300" cy="20" r="1.4"><animate attributeName="opacity" values="0.25;1;0.25" dur="3.7s" begin="-2s" repeatCount="indefinite"/></circle>
      <circle cx="430" cy="44" r="1.1" fill="#7aa2f7"><animate attributeName="opacity" values="0.2;0.9;0.2" dur="2.8s" begin="-0.6s" repeatCount="indefinite"/></circle>
      <circle cx="540" cy="24" r="1.3"><animate attributeName="opacity" values="0.2;1;0.2" dur="3.3s" begin="-1.5s" repeatCount="indefinite"/></circle>
      <circle cx="660" cy="46" r="1.1" fill="#e6b75c"><animate attributeName="opacity" values="0.2;0.85;0.2" dur="2.9s" begin="-2.3s" repeatCount="indefinite"/></circle>
      <circle cx="760" cy="22" r="1.3"><animate attributeName="opacity" values="0.2;1;0.2" dur="3.5s" begin="-0.9s" repeatCount="indefinite"/></circle>
      <circle cx="840" cy="52" r="1.1" fill="#7aa2f7"><animate attributeName="opacity" values="0.2;0.9;0.2" dur="2.7s" begin="-1.8s" repeatCount="indefinite"/></circle>
    </g>

    <!-- small crescent moon -->
    <g filter="url(#gs)">
      <circle cx="912" cy="34" r="24" fill="url(#mg)" mask="url(#mm)"/>
    </g>

    <!-- sea -->
    <rect x="0" y="70" width="1000" height="80" fill="url(#sea)"/>
    <rect x="0" y="69" width="1000" height="1.4" fill="url(#hz)" filter="url(#gs)"/>

    <g fill="none" stroke="#7aa2f7" stroke-width="1" opacity="0.13" stroke-linecap="round">
      <path d="M -60 88 Q 40 84 140 88 T 340 88 T 540 88 T 740 88 T 940 88 T 1140 88">
        <animateTransform attributeName="transform" type="translate" values="0 0; -44 0; 0 0" dur="16s" repeatCount="indefinite"/>
      </path>
      <path d="M -60 108 Q 50 104 160 108 T 380 108 T 600 108 T 820 108 T 1040 108">
        <animateTransform attributeName="transform" type="translate" values="0 0; 50 0; 0 0" dur="20s" repeatCount="indefinite"/>
      </path>
      <path d="M -60 128 Q 45 124 150 128 T 360 128 T 570 128 T 780 128 T 990 128 T 1200 128">
        <animateTransform attributeName="transform" type="translate" values="0 0; -36 0; 0 0" dur="24s" repeatCount="indefinite"/>
      </path>
    </g>

    <!-- moonlight shimmer -->
    <g fill="#e6b75c">
      <rect x="880" y="76"  width="62" height="2.2" rx="1.1" opacity="0.26"><animate attributeName="opacity" values="0.12;0.3;0.12" dur="4s" repeatCount="indefinite"/></rect>
      <rect x="892" y="85"  width="42" height="2"   rx="1"   opacity="0.18"><animate attributeName="opacity" values="0.08;0.22;0.08" dur="3.4s" begin="-1.2s" repeatCount="indefinite"/></rect>
      <rect x="874" y="95"  width="74" height="2"   rx="1"   opacity="0.14"><animate attributeName="opacity" values="0.06;0.18;0.06" dur="4.6s" begin="-2s" repeatCount="indefinite"/></rect>
      <rect x="896" y="107" width="34" height="1.8" rx="0.9" opacity="0.1"><animate attributeName="opacity" values="0.04;0.14;0.04" dur="3.8s" begin="-0.8s" repeatCount="indefinite"/></rect>
    </g>

    <!-- star glints -->
    <g fill="#f5f3ed">
      <rect x="120" y="92"  width="13" height="1.5" rx="0.75" opacity="0.16"><animate attributeName="opacity" values="0.05;0.22;0.05" dur="3.3s" begin="-0.4s" repeatCount="indefinite"/></rect>
      <rect x="330" y="112" width="10" height="1.5" rx="0.75" opacity="0.13" fill="#7aa2f7"><animate attributeName="opacity" values="0.05;0.18;0.05" dur="2.9s" begin="-1.6s" repeatCount="indefinite"/></rect>
      <rect x="500" y="96"  width="14" height="1.5" rx="0.75" opacity="0.15"><animate attributeName="opacity" values="0.05;0.2;0.05" dur="3.8s" begin="-2.2s" repeatCount="indefinite"/></rect>
      <rect x="700" y="118" width="11" height="1.5" rx="0.75" opacity="0.12" fill="#e6b75c"><animate attributeName="opacity" values="0.04;0.16;0.04" dur="3.1s" begin="-1s" repeatCount="indefinite"/></rect>
    </g>

    <!-- the little sailboat, sailing home (right to left) -->
    <g opacity="0">
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.04;0.94;1" dur="75s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="translate" values="1070 78; -70 78" dur="75s" repeatCount="indefinite"/>
      <g transform="scale(-0.62,0.62)">
        <g>
          <animateTransform attributeName="transform" type="rotate" values="-3 0 4; 3 0 4; -3 0 4" dur="5s" repeatCount="indefinite"/>
          <ellipse cx="0" cy="13" rx="34" ry="4" fill="#e6b75c" opacity="0.12" filter="url(#gs)"/>
          <path d="M -33 -4 C -28 6 -14 9 0 9 C 15 9 28 5 34 -6 C 20 -2 -18 -1 -33 -4 Z"
                fill="#0a0f1e" stroke="#e6b75c" stroke-width="1.6" stroke-linejoin="round"/>
          <path d="M 3 -6 L 3 -58" stroke="#e6b75c" stroke-width="1.6" stroke-linecap="round"/>
          <path d="M 6 -55 C 24 -44 30 -26 31 -9 L 6 -9 Z" fill="url(#sg)" opacity="0.95" stroke="#d9a844" stroke-width="1"/>
          <path d="M 0 -48 C -14 -38 -20 -22 -22 -9 L 0 -9 Z" fill="#7aa2f7" opacity="0.8" stroke="#5b82d6" stroke-width="1"/>
          <path d="M 3 -58 L 16 -54 L 3 -50 Z" fill="#f5f3ed" opacity="0.9">
            <animateTransform attributeName="transform" type="rotate" values="-6 3 -58; 5 3 -58; -6 3 -58" dur="2.6s" repeatCount="indefinite"/>
          </path>
          <path d="M -30 -5 L -30 -12" stroke="#e6b75c" stroke-width="1" opacity="0.8"/>
          <circle cx="-30" cy="-15" r="2.6" fill="#f7e3b0" filter="url(#gs)">
            <animate attributeName="opacity" values="0.6;1;0.6" dur="2.8s" repeatCount="indefinite"/>
          </circle>
        </g>
      </g>
    </g>
  </g>
</svg>
